services:
  dashboard:
    image: forgejo.homeboxes.org/oliverhsj/experiment-tracker:latest
    environment:
      N8N_URL: ${N8N_URL}
      N8N_API_KEY: ${N8N_API_KEY}
      DASHBOARD_TITLE: ${DASHBOARD_TITLE:-Experiment Dashboard}
      DASHBOARD_HOST: ${DASHBOARD_HOST:-0.0.0.0}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8080}
      N8N_TIMEOUT_SECONDS: ${N8N_TIMEOUT_SECONDS:-5}
    ports:
      - "${DASHBOARD_PORT:-8080}:${DASHBOARD_PORT:-8080}"
    restart: unless-stopped
